name: Golden Keyword Miner Cron

on:
  schedule:
    # 💤 저비용 수거 모드: 2시간마다 운영 (데이터베이스 절약)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: keyword-expand-cron
      cancel-in-progress: false
    
    steps:
      - name: Trigger Miner API
        id: mining
        run: |
          set -e
          
          if [ -z "${{ secrets.PROD_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "❌ ERROR: PROD_URL or CRON_SECRET is not set."
            exit 1
          fi
          
          START_TIME=$(date +%s)
          echo "🚀🚀🚀 Starting LOW-COST mining at $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          # 📊 13개 AD API 키 기반 최적화
          # - 저비용 모드: 배치 50개, 동시성 조절
          
          # 🆕 Step 1: 대량 키워드 큐 처리 (있는 경우만)
          echo "📋 Checking bulk queue..."
          QUEUE_URL="${{ secrets.PROD_URL }}/api/miner/execute?task=process_queue"
          QUEUE_RESPONSE=$(curl -s -X GET "$QUEUE_URL" \
            -H "CRON_SECRET: ${{ secrets.CRON_SECRET }}" \
            --max-time 60) || echo "{}"
          echo "Queue response: $QUEUE_RESPONSE"
          
          # Step 2: 일반 마이너 루프 실행
          RUN_FOR_SECONDS=120  # 2분간 파편 루프 실행
          INTERVAL_SECONDS=20  # 20초 간격
          END_TIME=$((START_TIME + RUN_FOR_SECONDS))

          # ⚠️ Safe Mode: expandBatch=50, maxRunMs=40000 (40s)
          PARAMS="task=expand&mode=TURBO&expandBatch=50&expandConcurrency=10&minSearchVolume=30&maxRunMs=40000"
          API_URL="${{ secrets.PROD_URL }}/api/miner/execute?$PARAMS"

          TOTAL_OK=0
          TOTAL_FAIL=0

          while [ $(date +%s) -lt $END_TIME ]; do
            echo "📡 Calling miner: $API_URL"

            MAX_RETRIES=1
            RETRY_COUNT=0
            SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
              RESPONSE=$(curl -X GET "$API_URL" \
                -H "CRON_SECRET: ${{ secrets.CRON_SECRET }}" \
                -w "\n%{http_code}" \
                --max-time 75 \
                --silent \
                --show-error) || true

              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" = "200" ]; then
                SUCCESS=true
                TOTAL_OK=$((TOTAL_OK + 1))
                echo "✅ HTTP $HTTP_CODE"
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "⚠️  HTTP $HTTP_CODE (retry $RETRY_COUNT/$MAX_RETRIES)"
                echo "Response: $BODY"
                sleep 5
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              TOTAL_FAIL=$((TOTAL_FAIL + 1))
            fi

            sleep $INTERVAL_SECONDS
          done

          echo "📈 Loop summary: OK=$TOTAL_OK FAIL=$TOTAL_FAIL"
          echo "🎉 ULTRA stable mining completed!"
